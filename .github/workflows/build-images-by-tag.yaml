name: Build Python & Spring-Boot images while tag

on:
  push:
    tags:
      - 'v*'
  
  # manually trigger the workflow
  #workflow_dispatch:
  #  inputs:
  #    image_tag:
  #      description: 'Image tag (e.g., v1.0.0, latest)'
  #      required: true
  #      default: 'latest'


permissions:
  contents: read
  packages: write

jobs:
  build-python-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in into GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/python-agent
          tags: |
            type=ref,event=tag
          #tags: |
          #  type=raw,value=${{ github.event.inputs.image_tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./python
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-spring-boot-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in into GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Java environment AND specify the exact Maven version you want
      - name: Set up JDK 25 & Maven CLI
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: 'maven'

      # a valid image name format: '[domainHost:port/][path/]name[:tag][@digest]' (with 'path' and 'name' containing only [a-z0-9][.][_][-]) 
      - name: Extract Image Name and Tag
        run: |
          echo "IMAGE_NAME=`echo "ghcr.io/${{ github.repository }}/spring-boot-flow" | tr '[:upper:]' '[:lower:]'`" >> $GITHUB_ENV
          echo "IMAGE_TAG=`echo "${{ github.event.inputs.image_tag }}" | tr '[:upper:]' '[:lower:]'`" >> $GITHUB_ENV

      # Run the Spring Boot Buildpack wrapper
      - name: Build image with Maven Buildpack
        run: |
          java -version
          mvn -version
          cd spring-boot
          pwd
          mvn spring-boot:build-image \
            -Dspring-boot.build-image.imageName=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -Dspring-boot.build-image.publish=true \
            -Dspring-boot.build-image.docker.publishRegistry.username=${{ github.actor }} \
            -Dspring-boot.build-image.docker.publishRegistry.password=${{ secrets.GITHUB_TOKEN }} \
            -Dspring-boot.build-image.docker.publishRegistry.url=https://ghcr.io
